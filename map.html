<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DEAMLO99 - Map</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/map.css">

</head>

<body>

<div class="map-page">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            DEAMLO99

        </div>

        <div class="progress">

            <h2>Progress</h2>

            <span>0 / 101</span>

        </div>

        <div class="filters">

            <h2>Collectibles</h2>

            <label>

                <input type="checkbox" checked>

                Chests

            </label>

            <label>

                <input type="checkbox" checked>

                Flags

            </label>

            <label>

                <input type="checkbox" checked>

                Feathers

            </label>

        </div>

    </aside>

    <!-- Map -->

    <main class="map-container">

        <div id="map">

            SVG MAP

        </div>

    </main>

</div>

<script src="js/map.js"></script>

</body>

</html>
