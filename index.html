<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DEAMLO99</title>

    <meta name="description" content="Interactive Game Maps & Collectibles">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Header -->
    <header>

        <div class="logo">
            DEAMLO99
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Games</a>

            <a href="#">Maps</a>

            <a href="#">Collectibles</a>

            <a href="#">Favorites</a>

        </nav>

    </header>

    <!-- Hero -->

    <section id="hero">

        <div class="hero-content">

            <h1>
                PLAY • EXPLORE • ACHIEVE
            </h1>

            <p>

                Interactive Game Maps
                made for completionists.

            </p>

            <button>

                Explore Maps

            </button>

        </div>

    </section>

    <!-- Search -->

    <section id="search">

        <input
            type="text"
            placeholder="Search Games...">

    </section>

    <!-- Statistics -->

    <section id="stats">

        <div class="card">

            <h2>Games</h2>

            <span>0</span>

        </div>

        <div class="card">

            <h2>Maps</h2>

            <span>0</span>

        </div>

        <div class="card">

            <h2>Collectibles</h2>

            <span>0</span>

        </div>

        <div class="card">

            <h2>Completed</h2>

            <span>0%</span>

        </div>

    </section>

    <!-- Featured Games -->

    <section id="games">

        <h2>

            Featured Games

        </h2>

    </section>

    <!-- Footer -->

    <footer>

        MADE IN IRAQ BY DEAMLO99

    </footer>

    <script src="js/app.js"></script>

</body>

</html>
