<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAMLO99</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="assets/logo/logo.png" alt="DEAMLO99">
    <h1>DEAMLO99</h1>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Maps</a>
    <a href="#">Favorites</a>
  </nav>

  <button class="search-btn">🔍</button>
</header>

<section id="hero">
  <div class="hero-content">
    <h1>PLAY • EXPLORE • COMPLETE</h1>
    <p>Interactive game maps designed for trophy hunters and completionists.</p>
    <button>Explore Maps</button>
  </div>
</section>

<section id="search">
  <div class="search-box">
    <input type="text" placeholder="Search for a game...">
    <button>🔍</button>
  </div>
</section>

<section id="games">
  <div class="container">
    <div class="section-title">
      <h2>Featured Games</h2>
      <p>Explore interactive maps for your favorite games.</p>
    </div>

    <!-- سيتم إنشاء البطاقات تلقائياً من data/games.json -->
    <div class="games-grid"></div>
  </div>
</section>

<section id="latest">
  <div class="container">
    <div class="section-title">
      <h2>Latest Maps</h2>
    </div>
    <div class="latest-list"></div>
  </div>
</section>

<footer>
  <h2>MADE IN IRAQ</h2>
  <p>BY DEAMLO99</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
